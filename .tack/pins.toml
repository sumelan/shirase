# tack pins
# edit by hand or with tack add / rm / alias
# nix reads pins.lock.json
# this file drives tack update

# shorturl schemes
# scheme rest expands rest into {path}
[shorturls]
gh = "github:{path}" # github
cb = "git+https://codeberg.org/{path}" # codeberg

# all_follow maps input names to the top-level pin they follow
# opt out per-input with exclude_follow
[all_follow]
nixpkgs = "nixpkgs"
flake-parts = "flake-parts"
hjem = "hjem"

home-manager = ""
flake-compat = ""

# nixpkgs = ["nixpkgs-stable", "nixpkgs-unstable"]

# inputs.<name> fields
#   url             required, shorturl ok, ?rev=<sha> pins an exact commit
#   type            flake (default), fetch, or fixed
#   flake           legacy false means type = "fetch"
#   follows         { child = "pin" } override map
#   exclude_follow  all_follow names to skip
#   dir             subdir holding flake.nix
#   submodules      fetch git submodules
#   unpack          fixed-only tarball or file
[inputs]

[inputs.nixpkgs]
url = "gh:nixos/nixpkgs/nixos-unstable"

[inputs.flake-parts]
url = "gh:hercules-ci/flake-parts"

[inputs.hjem]
url = "gh:feel-co/hjem"

[inputs.niri-nix]
url = "cb:BANanaD3V/niri-nix"

[inputs.dankMaterialShell]
url = "gh:AvengeMedia/DankMaterialShell"

[inputs.impermanence]
url = "gh:nix-community/impermanence"

[inputs.nix-hazkey]
url = "gh:aster-void/nix-hazkey"

[inputs.nix-index-database]
url = "gh:nix-community/nix-index-database"

[inputs.nvf]
url = "gh:notashelf/nvf"

[inputs.sops-nix]
url = "gh:Mic92/sops-nix"

[inputs.run0-sudo-shim]
url = "gh:lordgrimmauld/run0-sudo-shim"

[inputs.zen-browser]
url = "gh:youwen5/zen-browser-flake"

[inputs.helium-browser]
url = "gh:schembriaiden/helium-browser-nix-flake"

[inputs.dms-plugins]
url = "gh:AvengeMedia/dms-plugins"
type = "fetch"

[inputs.dms-screen-recorder]
url = "gh:arqueon/dms-screen-recorder"
type = "fetch"

[inputs.dms-display-mirror]
url = "gh:jfchenier/dms-display-mirror"
type = "fetch"

[inputs.tack]
url = "gh:manic-systems/tack"

[inputs.helix]
url = "gh:helix-editor/helix"
