[osd]
position = "bottom_center"
position_vertical = "bottom_center"

[plugin_settings."noctalia/mpvpaper"]
picker_placement = "floating"
picker_position = "top_left"
video_directory = "~/Videos/Wallpapers/blueArchive"

[plugins]
enabled = [ "noctalia/notes", "noctalia/mpvpaper", "noctalia/screen_recorder" ]

[shell]
avatar_path = "/home/sumelan/.face"
font_family = "Montserrat"
niri_overview_type_to_launch_enabled = true
polkit_agent = true
settings_show_advanced = true

    [shell.greeter_sync]
    auto_sync = true

    [shell.launcher]
    categories = false
    session_search = false

    [shell.panel]
    clipboard_position = "bottom_center"
    control_center_placement = "floating"
    control_center_position = "top_left"
    launcher_placement = "floating"
    session_placement = "floating"
    session_position = "bottom_center"
    transparency_mode = "glass"
    wallpaper_placement = "floating"
    wallpaper_position = "top_left"

    [shell.screen_corners]
    enabled = true
    size = 40

    [shell.screenshot]
    directory = "/home/sumelan/Pictures/Screenshots"
    pipe_command = "waytator"
    pipe_to_command = true

[theme]
builtin = "Nord"
mode = "dark"
source = "builtin"

    [theme.templates]
    builtin_ids = [ "niri" ]
    community_ids = []

[wallpaper.default]
path = "/home/sumelan/Pictures/Wallpapers/blueArchive/1137852.png"

[wallpaper.last]
path = "/home/sumelan/Pictures/Wallpapers/blueArchive/1137852.png"

[wallpaper.monitors.DSI-1]
path = "/home/sumelan/Pictures/Wallpapers/blueArchive/1137852.png"

[widget.audio_visualizer]
width = 125

[widget.control-center]
font_family = "Montserrat"
glyph = "niri"

[widget.media]
art_size = 25
hide_when_no_media = true
title_scroll = "on_hover"

[widget.notes]
type = "noctalia/notes:notes"

[widget.network]
show_label = false

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.spacer_1]
type = "spacer"

[widget.spacer_2]
type = "spacer"

[widget.tray]
drawer = true

[widget.workspaces]
display = "none"
focused_output_only = true
font_family = "Montserrat"
hide_when_empty = true
labels_only_when_occupied = true
