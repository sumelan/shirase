[osd]
background_opacity = 0.69999998435378075
position = "bottom_center"
position_vertical = "bottom_center"

[shell]
avatar_path = "/home/sumelan/.face"
font_family = "Montserrat"
niri_overview_type_to_launch_enabled = true
polkit_agent = true

    [shell.screen_corners]
    enabled = true
    size = 50

[theme]
source = "wallpaper"

[wallpaper.default]
path = "/home/sumelan/Pictures/Wallpapers/nix-d-nord-aurora.jpg"

[wallpaper.last]
path = "/home/sumelan/Pictures/Wallpapers/nix-d-nord-aurora.jpg"

[wallpaper.monitors.DSI-1]
path = "/home/sumelan/Pictures/Wallpapers/nix-d-nord-aurora.jpg"

[widget.audio_visualizer]
color_1 = "on_primary"
color_2 = "tertiary"
width = 125

[widget.control-center]
glyph = "niri"

[widget.media]
art_size = 25
hide_when_no_media = true
title_scroll = "on_hover"

[widget.spacer_2]
type = "spacer"

[widget.workspaces]
display = "none"
focused_output_only = true
hide_when_empty = true
labels_only_when_occupied = true