[audio]
enable_sounds = true

[backdrop]
enabled = true
blur_intensity = 0.2

[bar]
order = [ "sideBar" ]

    [bar.sideBar]
    background_opacity = 0.5
    capsule_opacity = 0.54999998770654202
    capsule_padding = 10.0
    center = [ "media", "audio_visualizer" ]
    end = [ "recorder", "network", "bluetooth", "volume", "brightness", "battery", "session" ]
    font_family = "Maple Mono NF"
    icon_color = "primary"
    margin_ends = 0
    position = "left"
    radius = 20
    scale = 1.5000000149011612
    start = [ "control-center", "workspaces", "notifications", "privacy" ]
    thickness = 50
    widget_spacing = 20

[brightness]
sync_all_monitors = true

[calendar]
enabled = true

[desktop_widgets]
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001", "desktop-widget-0000000000000002" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 64.0
    box_width = 240.0
    cx = 1768.0
    cy = 1144.0
    output = "DSI-1"
    rotation = 0.0
    type = "label"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        background_opacity = 0.59999999999999998
        color = "hover"
        description = ""
        font_family = "Maple Mono NF"
        opacity = 0.5
        shadow = true
        title = " NixOS"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 80.0
    box_width = 224.0
    cx = 192.0
    cy = 88.0
    output = "DSI-1"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        background = false
        center_text = true
        color = "tertiary"
        font_family = "Maple Mono NF"
        format = "{:%H:%M:%S}"

[dock]
active_monitor_only = true
auto_hide = true
background_opacity = 0.34999999217689037

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 400.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 800.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 500.0

[location]
auto_locate = true
